<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Solve 2x2 Linear Systems Using The Inverse MatrixMethod</title>
    <link rel="stylesheet" href="/css/stylesSideBar.css">
    <link rel="stylesheet" href="/css/stylesLinearSystems.css">
    <script src="/js/overlayhelper.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>   
    <script src="/js/solveLinearSystemsStepsColours.js"></script>
</head>
<body>
<div id="linearSystemsPage"
     class="app-layout"
     th:data-determinant-step="${result.determinantStep}"
     th:data-inverse-current-step="${result.inverseCurrentStep}"
     th:data-solve-linear-step="${result.solveLinearStep}">
    <div th:replace="~{sidebar :: sidebar}"></div>
        <main class="matrix-page">
            <form th:action="@{/inverse-matrix-method}" method="post">
                <input type="hidden" name="currentSection" th:value="${result.currentSection}">
                <input type="hidden" name="determinantStep" th:value="${result.determinantStep}">            
                <input type="hidden" name="inverseCurrentStep" th:value="${result.inverseCurrentStep}">
                <input type="hidden" name="solveLinearStep" th:value="${result.solveLinearStep}">                
                <div th:replace="~{fragments/inverseMatrixMethodHeader :: inverseMatrixMethodHeader}"></div>
                <div th:if="${result.hasMatrixValues}" th:replace="~{fragments/inverseMatrixMethodSectionOne :: inverseMatrixMethodSectionOne}"></div>
                <div th:if="${result.determinantStep >= 1}" th:replace="~{fragments/inverseMatrixMethodSectionTwo :: inverseMatrixMethodSectionTwo}"></div>
                <div th:if="${result.determinantStep >= 3}" th:replace="~{fragments/inverseMatrixMethodSectionThree :: inverseMatrixMethodSectionThree}"></div>
                <div th:if="${result.hasFinalLinearSystemWalkthrough}" th:replace="~{fragments/inverseMatrixMethodSectionFour :: inverseMatrixMethodSectionFour}"></div>                
            </form>
        </main>
    </div>
</body>
</html>
