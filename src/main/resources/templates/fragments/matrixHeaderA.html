<div th:fragment="matrixHeaderA" class="matrix-inputs-dashboard">
    <div class="matrix-controls">

        <h1>Matrix A</h1>

        <label for="size">Matrix Size:</label>

        <select id="size" name="size" aria-label="Matrix Size">
            <option value="2" th:selected="${size == 2}">
                2 × 2
            </option>
            <option value="3" th:selected="${size == 3}">
                3 × 3
            </option>
            <option value="4" th:selected="${size == 4}">
                4 × 4
            </option>
        </select>

        <button type="submit"
                name="action"
                value="change-size"
                class="btn-secondary">
            Change Size
        </button>

        <button type="submit"
                name="action"
                value="update-matrix"
                class="btn-primary">
            Update Matrix
        </button>

        <input type="hidden"
               name="size"
               th:value="${size ?: 2}">

        <table class="matrix-table">
            <tr th:each="row : ${#numbers.sequence(0, (size ?: 2) - 1)}">
                <td th:each="col : ${#numbers.sequence(0, (size ?: 2) - 1)}">

                    <input type="number"
                           step="any"
                           title="Matrix cell value"
                           placeholder="Enter value"
                           th:id="'cell_' + ${row} + '_' + ${col}"
                           th:name="'cell_' + ${row} + '_' + ${col}"
                           th:value="${matrixA != null && matrixA[row][col] != 0 ? matrixA[row][col] : ''}"
                           class="matrix-input">

                </td>
            </tr>
        </table>

    </div>
</div>
