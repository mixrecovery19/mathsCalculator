<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Linear Equations</title>

    <link rel="stylesheet" href="/css/stylesSideBar.css">
    <link rel="stylesheet" href="/css/stylesLinearEquations.css">
</head>

<body>

<div class="app-layout">

    <div th:replace="~{sidebar :: sidebar}"></div>

    <main class="matrix-page">

        <form th:action="@{/linear-equations}" method="post">

            <section class="hero-card">

                <h1>Linear Equations Calculator</h1>

                <details class="math-details">
                    <summary>What is Elimination?</summary>

                    <p class="math-description">
                        Linear equations can be solved by eliminating one variable,
                        solving for the remaining variable, and then substituting
                        the answer back into the original equation.
                    </p>
                </details>

                <h2>Equation 1</h2>

                <div class="equation-row">

                    <input type="number" step="any" name="a"
                           class="matrix-input">

                    <span>x +</span>

                    <input type="number" step="any" name="b"
                           class="matrix-input">

                    <span>y =</span>

                    <input type="number" step="any" name="c"
                           class="matrix-input">

                </div>

                <h2>Equation 2</h2>

                <div class="equation-row">

                    <input type="number" step="any" name="d"
                           class="matrix-input">

                    <span>x +</span>

                    <input type="number" step="any" name="e"
                           class="matrix-input">

                    <span>y =</span>

                    <input type="number" step="any" name="f"
                           class="matrix-input">

                </div>

                <div class="button-group">

                    <button type="submit"
                            class="btn-primary">
                        Update Equations
                    </button>

                </div>

            </section>

        </form>

    </main>

</div>

</body>
</html>
