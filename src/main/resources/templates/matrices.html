<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Calculator</title>
    <link rel="stylesheet" href="/css/stylesSideBar.css">
    <link rel="stylesheet" href="/css/stylesMatrices.css">
</head>
<body>  
    <div class="app-layout">
    <div th:replace="~{sidebar :: sidebar}"></div>
    <main class="matrix-page">
    <div class="matrix-card">
    <h1>Matrix Calculator</h1>
        <form th:action="@{/matrices/create}" method="post">
            <label for="size">Matrix Size:</label>
            <select id="size" name="size" aria-label="Matrix Size">

                <option value="2">2 × 2</option>
                <option value="3">3 × 3</option>
                <option value="4">4 × 4</option>

            </select>
        <div class="button-group">
            <button type="submit" class="btn-primary">Create Matrix</button>                
        </form> 
        <div class="button-group">
            <a href="/" class="btn-secondary link-button">Back to Home</a>
        </div>              
    </div>
    </main>
</html>
